<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="AI News Brief — 매일 자동 생성되는 AI 뉴스 디지스트 시각화" />
  <title>AI News Brief</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./assets/styles.css" />

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    if (window.tailwind) {
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: { extend: {} },
        corePlugins: { preflight: false }
      };
    }
  </script>
</head>
<body class="min-h-screen">
  <a class="skip-link" href="#main">본문으로 건너뛰기</a>

  <header class="app-header" role="banner">
    <div class="header-inner">
      <a href="#/today" class="wordmark" aria-label="AI News Brief 홈">
        <span class="wordmark-dot" aria-hidden="true"></span>
        <span>AI News Brief</span>
      </a>

      <nav class="date-nav" aria-label="날짜 네비게이션">
        <button class="icon-btn" data-action="prev-date" aria-label="이전 날짜" title="이전 날짜 ([)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="date-label" data-action="open-calendar" aria-label="날짜 선택">
          <span data-bind="current-date">—</span>
          <span class="date-sub" data-bind="current-run"></span>
        </button>
        <button class="icon-btn" data-action="next-date" aria-label="다음 날짜" title="다음 날짜 (])">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="icon-btn" data-action="today" aria-label="최신 회차" title="최신 (g t)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
      </nav>

      <div class="header-actions">
        <div class="seg-toggle" role="tablist" aria-label="뷰 전환">
          <button class="seg" data-view="daily" role="tab" aria-selected="true">일간</button>
          <button class="seg" data-view="weekly" role="tab" aria-selected="false">주간</button>
        </div>
        <button class="icon-btn" data-action="open-admin" aria-label="관리" title="관리 (#/admin)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="icon-btn mobile-only" data-action="open-drawer" aria-label="필터 열기">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="icon-btn" data-action="cycle-theme" aria-label="테마 전환" title="테마 전환">
          <svg class="theme-icon-auto" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <svg class="theme-icon-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="theme-icon-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="필터">
      <div class="sidebar-inner">
        <section class="filter-block">
          <h3 class="filter-title">토픽</h3>
          <div data-bind="topic-list" class="topic-list" role="group" aria-label="토픽 다중 선택"></div>
        </section>

        <section class="filter-block">
          <h3 class="filter-title">태그</h3>
          <div role="search">
            <input type="search" class="text-input" data-bind="tag-input" placeholder="태그 검색…" aria-label="태그 검색" />
          </div>
          <div class="active-tags" data-bind="active-tags"></div>
          <div class="tag-suggestions" data-bind="tag-suggestions"></div>
        </section>

        <button class="link-btn" data-action="clear-filters" hidden>전체 해제</button>
      </div>
    </aside>

    <main id="main" class="main" tabindex="-1" aria-label="기사 목록">
      <div data-bind="content"></div>
    </main>
  </div>

  <div class="drawer-backdrop" data-action="close-drawer" hidden></div>
  <aside class="mobile-drawer" id="mobile-drawer" hidden aria-label="필터 드로어">
    <div class="drawer-head">
      <span>필터</span>
      <button class="icon-btn" data-action="close-drawer" aria-label="닫기">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-body" data-bind="drawer-body"></div>
  </aside>

  <div class="modal-backdrop" data-action="close-modal" hidden></div>
  <aside class="article-panel" id="article-panel" hidden role="dialog" aria-modal="true" aria-labelledby="article-modal-title">
    <div class="panel-head">
      <button class="icon-btn" data-action="close-modal" aria-label="닫기 (Esc)">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <a class="link-btn" data-bind="article-source-link" target="_blank" rel="noopener noreferrer">원문 열기 ↗</a>
    </div>
    <div class="panel-body" data-bind="article-body"></div>
  </aside>

  <input type="date" id="calendar-input" class="visually-hidden" />

  <template id="tpl-skeleton">
    <div class="skeleton-list" aria-busy="true">
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
      <div class="card skeleton"></div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script type="module" src="./assets/app.js"></script>
</body>
</html>
